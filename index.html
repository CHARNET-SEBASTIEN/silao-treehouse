<!doctype html>

  <head>
    <!-- Google tag (gtag.js) + Consent Mode v2 : défaut refus, reprise du choix dans localStorage -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      window.gtag = gtag;
      var __silaoConsentKey = "silao-cookie-consent";
      var __silaoStored = null;
      try {
        __silaoStored = localStorage.getItem(__silaoConsentKey);
      } catch (e) {}
      gtag("consent", "default", {
        ad_storage: "denied",
        ad_user_data: "denied",
        ad_personalization: "denied",
        analytics_storage: "denied",
        wait_for_update: 500,
      });
      if (__silaoStored === "accepted") {
        gtag("consent", "update", {
          ad_storage: "granted",
          ad_user_data: "granted",
          ad_personalization: "granted",
          analytics_storage: "granted",
        });
      }
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18069760229"></script>
    <script>
      window.gtag("js", new Date());
      window.gtag("config", "AW-18069760229", { send_page_view: false });
    </script>

    <script>
      (() => {
        const storageKey = "silao-theme";
        const storedTheme = window.localStorage.getItem(storageKey);
        const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = storedTheme === "light" || storedTheme === "dark"
          ? storedTheme
          : systemPrefersDark
            ? "dark"
            : "light";

        document.documentElement.classList.toggle("dark", theme === "dark");
      })();
    </script>
